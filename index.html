// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n, short) {
  if (short) {
    const a = Math.abs(n);
    if (a >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
    if (a >= 1e3) return "$" + (n / 1e3).toFixed(0) + "K";
    return "$" + Math.round(n);
  }
  return new Intl.NumberFormat("en-US", { style:"currency", currency:"USD", maximumFractionDigits:0 }).format(n);
}

// ── CHARTS ────────────────────────────────────────────────────────────────────

function NWChart({ data, color, h }) {
  color = color || T.blue; h = h || 100;
  const vals = Object.values(data);
  const keys = Object.keys(data);
  const mn = Math.min.apply(null, vals);
  const mx = Math.max.apply(null, vals);
  const rng = mx - mn || 1;
  const [hov, setHov] = useState(null);

  const W = 100, H = h, PAD = 4;
  function xOf(i) { return PAD + (i / (vals.length - 1)) * (W - PAD * 2); }
  function yOf(v) { return PAD + (1 - (v - mn) / rng) * (H - PAD * 2); }

  const pts = vals.map(function(v, i) { return xOf(i) + "," + yOf(v); });
  const gradId = "nwg" + color.replace("#","");
  const taxIdx = keys.indexOf("2022-04");

  return (
    <div style={{ position:"relative", userSelect:"none", WebkitUserSelect:"none" }}>
      <svg viewBox={"0 0 " + W + " " + H} preserveAspectRatio="none"
        style={{ width:"100%", height:H, display:"block", touchAction:"none" }}
        onMouseLeave={function(){ setHov(null); }}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.28" />
            <stop offset="100%" stopColor={color} stopOpacity="0.02" />
          </linearGradient>
        </defs>

        {/* subtle grid lines only — no labels */}
        {[0.25, 0.5, 0.75].map(function(f) {
          var y = PAD + f * (H - PAD * 2);
          return <line key={f} x1={PAD} y1={y} x2={W-PAD} y2={y}
            stroke={T.border} strokeWidth="0.3" vectorEffect="non-scaling-stroke" />;
        })}

        {/* Tax event marker */}
        {false && taxIdx >= 0 && (
          <line x1={xOf(taxIdx)} y1={PAD} x2={xOf(taxIdx)} y2={H - PAD}
            stroke="#f87171" strokeWidth="0.8" strokeDasharray="1.2,1"
            vectorEffect="non-scaling-stroke" />
        )}

        {/* Area + line */}
        <path d={"M" + pts[0] + " L" + pts.join(" L") +
          " L" + xOf(vals.length-1) + "," + (H-PAD) + " L" + xOf(0) + "," + (H-PAD) + " Z"}
          fill={"url(#" + gradId + ")"} />
        <path d={"M" + pts.join(" L")} fill="none" stroke={color} strokeWidth="1.8"
          vectorEffect="non-scaling-stroke" />

        {/* Hover hit areas */}
        {vals.map(function(v, i) {
          var slotW = (W - PAD * 2) / Math.max(vals.length - 1, 1);
          return (
            <rect key={i} x={xOf(i) - slotW/2} y={0} width={slotW} height={H}
              fill="transparent"
              onMouseEnter={function(){ setHov(i); }}
              onTouchStart={function(e){ e.preventDefault(); setHov(i); }}
              style={{ cursor:"crosshair" }} />
          );
        })}

        {/* Hover dot + vertical line */}
        {hov !== null && (
          <g>
            <line x1={xOf(hov)} y1={PAD} x2={xOf(hov)} y2={H-PAD}
              stroke={color} strokeWidth="0.5" strokeDasharray="1,1"
              vectorEffect="non-scaling-stroke" />
            <circle cx={xOf(hov)} cy={yOf(vals[hov])} r="2" fill={color} />
          </g>
        )}
      </svg>

      {/* Tooltip */}
      {hov !== null && (function() {
        var xPct = (xOf(hov) / W) * 100;
        var chg = hov > 0 ? vals[hov] - vals[hov-1] : 0;
        return (
          <div style={{
            position:"absolute", top:6,
            left: xPct < 65 ? "auto" : "auto",
            ...(xPct < 65 ? { left:"52%" } : { left:"2%" }),
            background:"rgba(15,23,42,0.97)",
            border:"1px solid " + T.border,
            borderRadius:8, padding:"7px 11px",
            pointerEvents:"none", zIndex:10, minWidth:118
          }}>
            <div style={{ fontSize:9, color:T.dim, fontFamily:"monospace", marginBottom:3 }}>{keys[hov]}</div>
            <div style={{ fontSize:15, fontWeight:700, color:T.txt, fontFamily:"monospace" }}>
              {fmt(vals[hov], true)}
            </div>
            {chg !== 0 && (
              <div style={{ fontSize:10, color:chg>0?T.green:T.red, fontFamily:"monospace", marginTop:2 }}>
                {chg>0?"▲":"▼"} {fmt(Math.abs(chg), true)}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

          return (

              alignItems:"center", gap:0, cursor:"pointer", height:"100%", justifyContent:"flex-end" }}

              onMouseEnter={function() { setHov(i); }}

              <div style={{ width:"100%", height:bh,
                background:isH?"#93c5fd":color, borderRadius:"3px 3px 0 0",
                transition:"background 0.1s" }} />
              <div style={{ fontSize:6, color:isH?T.blue:T.dim, fontFamily:"monospace",
                transform:"rotate(-45deg)", transformOrigin:"center",
                whiteSpace:"nowrap", marginTop:3, height:14 }}>
                {keys[i].slice(5)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Donut({ data, size }) {
  size = size || 150;
  const entries = Object.entries(data).filter(function(e) { return e[1] > 0; });
  const total = entries.reduce(function(s, e) { return s + e[1]; }, 0);
  const cx = size / 2, cy = size / 2, r = size * 0.38, inn = size * 0.24;
  const [hov, setHov] = useState(null);
  let ang = -90;
  const slices = entries.map(function(e) {
    const lbl = e[0], val = e[1];
    const pct = val / total, sw = pct * 360;
    const a1 = ang * Math.PI / 180, a2 = (ang + sw) * Math.PI / 180;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const xi1 = cx + inn * Math.cos(a1), yi1 = cy + inn * Math.sin(a1);
    const xi2 = cx + inn * Math.cos(a2), yi2 = cy + inn * Math.sin(a2);
    const lg = sw > 180 ? 1 : 0;
    const path = "M" + xi1 + "," + yi1 + " L" + x1 + "," + y1 +
      " A" + r + "," + r + " 0 " + lg + " 1 " + x2 + "," + y2 +
      " L" + xi2 + "," + yi2 + " A" + inn + "," + inn + " 0 " + lg + " 0 " + xi1 + "," + yi1 + " Z";
    ang += sw;
    return { lbl, val, pct, path, color: CC[lbl] || T.muted };
  });
  const act = hov !== null ? slices[hov] : null;
  return (
    <svg width={size} height={size} style={{ display:"block", margin:"0 auto", touchAction:"none" }}>
      {slices.map(function(s, i) {
        return (
          <path key={s.lbl} d={s.path} fill={s.color}
            opacity={hov === null || hov === i ? 1 : 0.3}
            onTouchStart={function() { setHov(hov === i ? null : i); }}
            onMouseEnter={function() { setHov(i); }}
            onMouseLeave={function() { setHov(null); }}
            style={{ cursor:"pointer", transition:"opacity 0.15s" }} />
        );
      })}
      <text x={cx} y={cy - 4} textAnchor="middle" fontSize="11" fontWeight="700"
        fill={T.txt} fontFamily="sans-serif">
        {act ? ((act.pct * 100).toFixed(0) + "%") : fmt(total, true)}
      </text>
      <text x={cx} y={cy + 10} textAnchor="middle" fontSize="5" fill={T.muted} fontFamily="monospace">
        {act ? act.lbl.toUpperCase() : "TOTAL SPENT"}
      </text>
    </svg>
  );
}

// ── PRIMITIVES ────────────────────────────────────────────────────────────────
function Card({ children, style }) {
  return (
    <div style={Object.assign({ background:T.surf, border:"1px solid " + T.border,
      borderRadius:14, padding:16, marginBottom:12 }, style || {})}>
      {children}
    </div>
  );
}
function Lbl({ children }) {
  return (
    <div style={{ fontSize:10, fontWeight:600, letterSpacing:2, textTransform:"uppercase",
      color:T.dim, fontFamily:"monospace", marginBottom:8 }}>
      {children}
    </div>
  );
}
function Big({ v, size, color }) {
  return (
    <div style={{ fontSize:size || 24, fontWeight:700, letterSpacing:-0.5,
      color:color || T.txt, lineHeight:1.1 }}>
      {v}
    </div>
  );
}
function Chg({ pos, children }) {
  return (
    <div style={{ fontSize:11, color:pos ? T.green : T.red, fontFamily:"monospace", marginTop:3 }}>
      {children}
    </div>
  );
}
function KpiGrid({ items, wide }) {
  const cols = wide && items.length >= 4 ? "1fr 1fr 1fr 1fr" : "1fr 1fr";
  return (
    <div style={{ display:"grid", gridTemplateColumns:cols, gap:10, marginBottom:12 }}>
      {items.map(function(item) {
        return (
          <Card key={item.label} style={{ marginBottom:0, padding:"14px 12px" }}>
            <Lbl>{item.label}</Lbl>
            <Big v={item.value} size={18} />
            {item.sub && <Chg pos={item.pos}>{item.sub}</Chg>}
          </Card>
        );
      })}
    </div>
  );
}

// On wide screens, lay cards out in 2 columns
function WideGrid({ wide, children }) {
  if (!wide) return <>{children}</>;
  const arr = React.Children.toArray(children);
  const left = arr.filter(function(_,i){ return i%2===0; });
  const right = arr.filter(function(_,i){ return i%2===1; });
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:0, alignItems:"start" }}>
      <div style={{ paddingRight:8 }}>{left}</div>
      <div style={{ paddingLeft:8 }}>{right}</div>
    </div>
  );
}

            var yr = TODAY_YR + y;
            bal = bal * (1 + netRate) - SPEND_YR;
            inflows.forEach(function(ev){ if (ev.year === yr) bal += ev.amount; });
            pts.push(Math.max(Math.round(bal), 0));

        const [hov, setHov] = useState(null);
        var W = 100, H = 120, ML = 2, MR = 2, MT = 10, MB = 14;
        var allVals = scenarios.reduce(function(a,s){ return a.concat(s.pts); }, []);
        var mx = Math.max.apply(null, allVals) * 1.06;
        var selfFundNW = SPEND_YR / netRate;

        function xOf(i){ return ML + (i/YEARS)*(W-ML-MR); }
        function yOf(v){ return MT + (1 - Math.max(v,0)/mx)*(H-MT-MB); }
        function makePath(pts){ return "M"+pts.map(function(v,i){ return xOf(i)+","+yOf(v); }).join(" L"); }

        return (

function Spending({ derived, wide }) {
  const { curSpend, avgSpend } = derived;
  const totalCats = Object.values(D.cats).reduce(function(a,b){ return a+b; }, 0);

  // Annual summary data
  // Compute annual spend totals directly from SP2022 (Jan 2022+) — auto-updates each month
  const PARTIAL_YEARS = { "2026":4 }; // months of data available
  const YEAR_NOTES = {
    "2022":"Post-sale lifestyle shift",
    "2023":"Peak spend year",
    "2024":"Full year",
    "2025":"Full year",
    "2026":"Jan–Apr only",
  };
  const annualTotals = {};
  Object.entries(SP2022).forEach(function([k,v]) {
    var yr = k.slice(0,4);
    annualTotals[yr] = (annualTotals[yr]||0) + v;
  });
  const annualRows = Object.entries(annualTotals).sort().map(function([yr, spend]) {
    var months = PARTIAL_YEARS[yr] || 12;
    return {
      year:parseInt(yr), spend:Math.round(spend),
      note:YEAR_NOTES[yr]+" · avg "+fmt(Math.round(spend/months),true)+"/mo",
      partial:!!PARTIAL_YEARS[yr],
    };
  });
  const maxAnnual = Math.max.apply(null, annualRows.map(function(r){ return r.spend; }));

  // Monthly spend — split by year for bar charts
  const spendEntries = Object.entries(SP2022);
  const byYear = {};
  spendEntries.forEach(function(e) {
    var yr = e[0].slice(0,4);
    if (!byYear[yr]) byYear[yr] = {};
    byYear[yr][e[0]] = e[1];
  });

  // Rolling 12-month average — compute for each month that has 12 prior months
  const spendVals = spendEntries.map(function(e){ return e[1]; });
  const spendKeys = spendEntries.map(function(e){ return e[0]; });
  const rolling = [];
  for (var i = 0; i < spendVals.length; i++) {
    if (i < 11) { rolling.push(null); continue; }
    var sum = 0;
    for (var j = i-11; j <= i; j++) sum += spendVals[j];
    rolling.push(Math.round(sum / 12));
  }

  return (
    <WideGrid wide={wide}>
      <KpiGrid wide={wide} items={[
        { label:"This Month",  value:fmt(curSpend,true), sub:(curSpend<avgSpend?"▼ ":"▲ ")+fmt(Math.abs(curSpend-avgSpend),true)+" vs 12mo avg", pos:curSpend<avgSpend },
        { label:"12-Mo Avg",   value:fmt(avgSpend,true), sub:"Trailing 12 months", pos:true },
      ]} />

      {/* Rolling 12-month average chart */}
      <Card>
        <Lbl>Monthly Spend + 12-Month Rolling Average</Lbl>
        <div style={{ fontSize:10, color:T.dim, fontFamily:"monospace", marginBottom:10 }}>
          Bars = monthly · Line = trailing 12-month avg · Hover/tap for details
        </div>
        {(function(){
          const [hov2, setHov2] = useState(null);
          var vals = spendVals;
          var keys = spendKeys;
          var mx2 = Math.max.apply(null, vals);
          var W2=100, H2=90, ML2=2, MR2=2, MT2=6, MB2=12;

          function xOf2(i){ return ML2 + (i/(vals.length-1))*(W2-ML2-MR2); }
          function yOf2(v){ return MT2 + (1-(v/mx2))*(H2-MT2-MB2); }

          // Rolling line path (skip nulls)
          var rollPts = rolling.map(function(v,i){
            if (v===null) return null;
            return xOf2(i)+","+yOf2(v);
          }).filter(Boolean);
          var rollPath = rollPts.length ? "M"+rollPts[0]+" L"+rollPts.slice(1).join(" L") : "";

          return (
            <div style={{ position:"relative", userSelect:"none", WebkitUserSelect:"none" }}>
              <svg viewBox={"0 0 "+W2+" "+(H2+MB2)} preserveAspectRatio="none"
                style={{ width:"100%", height:H2+MB2, display:"block", touchAction:"none" }}
                onMouseLeave={function(){ setHov2(null); }}>

                {/* Bars */}
                {vals.map(function(v,i){
                  var bh = Math.max(1, (v/mx2)*(H2-MT2-MB2));
                  var x = xOf2(i);
                  var bw = Math.max(0.4, (W2-ML2-MR2)/(vals.length)*0.8);
                  var isH = hov2===i;
                  return (
                    <rect key={i}
                      x={x-bw/2} y={H2-MB2-bh} width={bw} height={bh}
                      fill={isH?"#93c5fd":T.blue} opacity={isH?1:0.5}
                      style={{ cursor:"crosshair" }}
                      onMouseEnter={function(){ setHov2(i); }}
                      onTouchStart={function(e){ e.preventDefault(); setHov2(i); }}/>
                  );
                })}

                {/* Rolling average line */}
                {rollPath && (
                  <path d={rollPath} fill="none" stroke="#f59e0b" strokeWidth="1.4"
                    vectorEffect="non-scaling-stroke"/>
                )}

                {/* Hover dot on rolling line */}
                {hov2!==null && rolling[hov2]!==null && (
                  <circle cx={xOf2(hov2)} cy={yOf2(rolling[hov2])} r="2" fill="#f59e0b"/>
                )}
              </svg>

              {/* X year labels — HTML so they don't stretch */}
              <div style={{ position:"relative", height:14, marginTop:-MB2 }}>
                {keys.map(function(k,i){
                  if (!k.endsWith("-01")) return null;
                  return (
                    <div key={k} style={{
                      position:"absolute",
                      left:((xOf2(i)/W2)*100)+"%",
                      transform:"translateX(-50%)",
                      fontSize:9, color:T.dim, fontFamily:"monospace",
                      whiteSpace:"nowrap"
                    }}>{k.slice(0,4)}</div>
                  );
                })}
              </div>

              {/* Tooltip */}
              {hov2!==null && (function(){
                var xPct = xOf2(hov2)/W2*100;
                var roll = rolling[hov2];
                return (
                  <div style={{ position:"absolute", top:4,
                    ...(xPct<60?{left:"40%"}:{left:"2%"}),
                    background:"rgba(15,23,42,0.97)", border:"1px solid "+T.border,
                    borderRadius:8, padding:"7px 11px", pointerEvents:"none", zIndex:10 }}>
                    <div style={{ fontSize:9, color:T.dim, fontFamily:"monospace", marginBottom:4 }}>
                      {keys[hov2]}
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color:T.blue, fontFamily:"monospace" }}>
                      {fmt(vals[hov2],true)}
                    </div>
                    {roll && (
                      <div style={{ fontSize:10, color:"#f59e0b", fontFamily:"monospace", marginTop:2 }}>
                        12mo avg: {fmt(roll,true)}
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          );
        })()}
        <div style={{ display:"flex", gap:14, marginTop:8, alignItems:"center" }}>
          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:14, height:8, background:T.blue, borderRadius:2, opacity:0.5 }}/>
            <span style={{ fontSize:9, color:T.dim, fontFamily:"monospace" }}>Monthly spend</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:14, height:2, background:"#f59e0b", borderRadius:1 }}/>
            <span style={{ fontSize:9, color:T.dim, fontFamily:"monospace" }}>12-mo rolling avg</span>
          </div>
        </div>
      </Card>

      {/* Annual overview */}
      <Card>
        <Lbl>Annual Spending — Jan 2022 to Present</Lbl>
        <div style={{ fontSize:10, color:T.dim, fontFamily:"monospace", marginBottom:14 }}>
          Mint (2022–Dec 2023) + transactions CSV (Jan 2024–Apr 2026) · excl. taxes, transfers, investments
        </div>
        {annualRows.map(function(r) {
          var barW = r.spend / maxAnnual * 100;
          var months = r.year===2026?4:12;
          var monthlyAvg = Math.round(r.spend / months);
          return (
            <div key={r.year} style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, alignItems:"baseline" }}>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  <span style={{ fontSize:13, fontWeight:700, color:T.txt }}>{r.year}</span>
                  {r.partial && <span style={{ fontSize:9, color:T.dim, fontFamily:"monospace",
                    background:T.deep, padding:"1px 6px", borderRadius:6 }}>partial</span>}
                </div>
                <div style={{ textAlign:"right" }}>
                  <span style={{ fontSize:13, fontWeight:700, fontFamily:"monospace", color:T.txt }}>
                    {fmt(r.spend,true)}
                  </span>
                  <span style={{ fontSize:10, color:T.dim, fontFamily:"monospace", marginLeft:8 }}>
                    {fmt(monthlyAvg,true)}/mo avg
                  </span>
                </div>
              </div>
              <div style={{ height:8, background:T.deep, borderRadius:3 }}>
                <div style={{ height:8, width:barW+"%",
                  background:r.year===2023?"#f87171":r.year===2022?"#f59e0b":r.year>=2024?"#60a5fa":T.muted,
                  borderRadius:3 }}/>
              </div>
              <div style={{ fontSize:9, color:T.dim, fontFamily:"monospace", marginTop:3 }}>{r.note}</div>
            </div>
          );
        })}
      </Card>

      {/* Monthly bars — 2022 */}
      <Card>
        <Lbl>Monthly Spending — 2022</Lbl>
        <Bars data={byYear["2022"]||{}} color="#94a3b8" h={80} />
      </Card>

      {/* Monthly bars — 2023 */}
      <Card>
        <Lbl>Monthly Spending — 2023</Lbl>
        <Bars data={byYear["2023"]||{}} color="#f59e0b" h={80} />
      </Card>

      {/* Monthly bars — 2024–2026 */}
      <Card>
        <Lbl>Monthly Spending — 2024</Lbl>
        <Bars data={byYear["2024"]||{}} color={T.blue} h={80} />
      </Card>

      <Card>
        <Lbl>Monthly Spending — 2025–2026</Lbl>
        <Bars data={Object.assign({}, byYear["2025"]||{}, byYear["2026"]||{})} color="#34d399" h={80} />
      </Card>

      {/* Category breakdown — all years */}
      <Card>
        <Lbl>By Category — Jan 2022 to Apr 2026</Lbl>
        <div style={{ fontSize:10, color:T.dim, fontFamily:"monospace", marginBottom:12 }}>
          {fmt(totalCats,true)} total · Mint + transactions CSV · excl. taxes, transfers, loan interest
        </div>
        <Donut data={D.cats} size={150} />
        <div style={{ marginTop:14 }}>
          {Object.entries(D.cats).map(function(e) {
            var cat = e[0], val = e[1];
            return (
              <div key={cat} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <div style={{ width:10, height:10, borderRadius:2, background:CC[cat]||T.muted, flexShrink:0 }}/>
                <span style={{ flex:1, fontSize:12, color:T.txt }}>{cat}</span>
                <span style={{ fontSize:11, color:T.muted, fontFamily:"monospace" }}>
                  {(val/totalCats*100).toFixed(1)}%
                </span>
                <span style={{ fontSize:12, fontFamily:"monospace", minWidth:52, textAlign:"right" }}>
                  {fmt(val,true)}
                </span>
              </div>
            );
          })}
        </div>
      </Card>
    </WideGrid>
  );
}

function NetWorth({ derived, wide }) {
  const { curNW } = derived;
  const nwArr = Object.entries(NW2022);
  const first = nwArr[0][1];
  const peak = Math.max.apply(null, Object.values(NW2022));
  const peakMo = Object.entries(NW2022).find(function(e) { return e[1] === peak; })[0];
  const totalRet = ((curNW - first) / first * 100).toFixed(1);
  const nw25 = Object.entries(NW2022).filter(function(e) { return e[0] >= "2025-01"; });
  const ret25 = ((nw25[nw25.length - 1][1] - nw25[0][1]) / nw25[0][1] * 100).toFixed(1);
  const nwPre2024  = Object.fromEntries(Object.entries(NW2022).filter(function(e) { return e[0] < "2024-01"; }));
  const nwPost2024 = Object.fromEntries(Object.entries(NW2022).filter(function(e) { return e[0] >= "2024-01"; }));

  return (
    <WideGrid wide={wide}>
      <KpiGrid wide={wide} items={[
        { label:"Current",       value:fmt(curNW, true),                       sub:"Apr 15, 2026",      pos:true },
        { label:"Since Jan '22", value:(totalRet >= 0 ? "+" : "") + totalRet + "%", sub:"From " + fmt(first, true), pos:totalRet >= 0 },
        { label:"Peak",          value:fmt(peak, true),                        sub:peakMo,              pos:true },
        { label:"2025 Return",   value:(ret25 >= 0 ? "+" : "") + ret25 + "%",  sub:"Jan 25 → now",     pos:ret25 >= 0 },
      ]} />

      <Card>
        <Lbl>Full History — Jan 2022 to Apr 2026</Lbl>
        <NWChart data={NW2022} color={T.blue} h={120} />
        <div style={{ fontSize:9, color:T.dim, fontFamily:"monospace", marginTop:6 }}>
          Jan 2022 onward · Hover/tap any point for exact value
        </div>
      </Card>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
        <Card style={{ marginBottom:0 }}>
          <Lbl>2022 – 2023</Lbl>
          <Bars data={nwPre2024} color={T.purple} h={80} />
        </Card>
        <Card style={{ marginBottom:0 }}>
          <Lbl>2024 – 2026</Lbl>
          <Bars data={nwPost2024} color={T.blue} h={80} />
        </Card>
      </div>

      <Card>
        <Lbl>Month by Month</Lbl>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:7 }}>
          {nwArr.map(function(entry, i) {
            const mo = entry[0], nw = entry[1];
            const chg = i > 0 ? nw - nwArr[i - 1][1] : 0;
            return (
              <div key={mo} style={{ background:T.deep, border:"1px solid " + T.border,
                borderRadius:8, padding:"8px 9px" }}>
                <div style={{ fontSize:8.5, color:T.dim, fontFamily:"monospace", marginBottom:2 }}>{mo}</div>
                <div style={{ fontSize:12, fontWeight:700, color:T.txt }}>{fmt(nw, true)}</div>
                {chg !== 0 && (
                  <div style={{ fontSize:8, color:chg > 0 ? T.green : T.red, fontFamily:"monospace" }}>
                    {chg > 0 ? "+" : ""}{fmt(chg, true)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>
    </WideGrid>
  );
}

function VsWorld({ derived, wide }) {
  const { curNW, curSpend, avgSpend } = derived;
  const annualSpend = avgSpend * 12;

  // UHNW targets
  const uhnwLow  = 30000000;
  const uhnwMid  = 40000000;
  const uhnwHigh = 50000000;
  const toUhnwLow  = uhnwLow  - curNW;
  const toUhnwMid  = uhnwMid  - curNW;
  const toUhnwHigh = uhnwHigh - curNW;

  // Global wealth tiers (UBS/Credit Suisse Global Wealth Report 2023, ~5.4B adults)
  const globalNW = [
    { label:"Global Median",    value:8654,     color:"#334155", note:"GWR 2023" },
    { label:"Global Top 10%",   value:100000,   color:"#64748b", note:"~$100K+" },
    { label:"Global Top 1%",    value:1000000,  color:"#94a3b8", note:"~$1M+" },
    { label:"HNW ($1M–$30M)",   value:5000000,  color:"#60a5fa", note:"22.8M people globally" },
    { label:"UHNW ($30M+)",     value:30000000, color:"#f59e0b", note:"~218K people globally" },
    { label:"You",              value:curNW,    color:"#34d399", note:"Apr 2026" },
  ];

  // US wealth tiers (Fed SCF 2022, age 40-44)
  const usNW = [
    { label:"US Median (40-44)", value:134382,   color:"#475569", note:"Fed SCF 2022" },
    { label:"US Top 25%",        value:436892,   color:"#64748b", note:"Fed SCF 2022" },
    { label:"US Top 10%",        value:1182580,  color:"#94a3b8", note:"Fed SCF 2022" },
    { label:"US Top 5%",         value:3779600,  color:"#60a5fa", note:"Fed SCF 2022" },
    { label:"US Top 1%",         value:13666778, color:"#a78bfa", note:"Fed SCF 2022" },
    { label:"You",               value:curNW,    color:"#34d399", note:"Apr 2026" },

            function yrsWithSpend(nw, target, rate, spend) {
              if (nw >= target) return 0;
              var bal = nw;
              for (var y = 1; y <= 80; y++) {
                bal = bal * (1 + rate) - spend;
                if (bal <= 0) return null;
                if (bal >= target) return y;
              }
              return null;
            }
            function lbl(y, noSpend) {
              if (y === 0) return "Already";
              if (y === null) return "Depletes";

                    <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr repeat(3,auto)",

                        var y = r.noSpend
                          ? (curNW>=t ? 0 : Math.ceil(Math.log(t/curNW)/Math.log(1+r.rate)))
                          : yrsWithSpend(curNW, t, r.rate, spend);

                          <span key={t} style={{ fontSize:11, fontFamily:"monospace", fontWeight:600,

          <div style={{ marginTop:14, display:"flex", flexDirection:"column" }}>

                  <div>
                    <div style={{ fontSize:12, fontWeight:600, color:"#fbbf24", marginBottom:2 }}>{r.label}</div>
                    <div style={{ fontSize:11, color:T.muted, lineHeight:1.5 }}>{r.sub}</div>
                  </div>
                </div>

            })}
          </div>
        </div>
      </Card>

      {/* Global context facts */}
      <Card>
        <Lbl>Global Context</Lbl>
        {[
          {icon:"🌍", text:"Your NW puts you in the global top 1% — fewer than 1% of the world's 5.4 billion adults hold $1M or more."},
          {icon:"✈️", text:"Your travel spend alone ("+fmt(Math.round(D.cats["Travel & Hotels"]/12),true)+"/mo) exceeds the total annual income of the average person in over 100 countries."},
          {icon:"📊", text:"There are ~22.8M HNW individuals ($1M–$30M) globally. You sit in the upper portion of this group, well above the $5M mark."},

          {icon:"🏦", text:"The US holds ~100,000 of the world's 218,000 UHNW individuals. At $30M you'd join 0.004% of global adults and 0.08% of US households."},

// ── STAT PILL ─────────────────────────────────────────────────────────────────
function StatPill({ label, value, sub, status }) {
  const colors = { good:"#34d399", warn:"#f59e0b", info:"#60a5fa", neutral:T.muted };
  const bgs    = { good:"#34d39915", warn:"#f59e0b15", info:"#60a5fa15", neutral:"#94a3b815" };
  const c = colors[status] || colors.neutral;
  const b = bgs[status]   || bgs.neutral;
  return (
    <div style={{ background:T.surf, border:"1px solid " + T.border, borderRadius:12,
      padding:"14px 14px", display:"flex", flexDirection:"column", gap:4 }}>
      <div style={{ fontSize:9, color:T.dim, fontFamily:"monospace", letterSpacing:1.5,
        textTransform:"uppercase" }}>{label}</div>
      <div style={{ fontSize:20, fontWeight:700, color:c }}>{value}</div>
      <div style={{ fontSize:10, color:T.muted, background:b, padding:"2px 8px",
        borderRadius:8, alignSelf:"flex-start" }}>{sub}</div>
    </div>
  );
}

function Insights({ derived, wide }) {
  const { curNW, curSpend, avgSpend, totalAssets, totalLiab } = derived;
  const annualSpend = avgSpend * 12;
  const realEstate  = D.groups.find(function(g){ return g.name==="Real Estate"; }).value;
  const investable  = curNW - realEstate;
  const ubsVal      = D.groups.find(function(g){ return g.name==="UBS Investments"; }).value;
  const ubsPct      = (ubsVal/totalAssets*100).toFixed(1);
  const debtToAsset    = (totalLiab/totalAssets*100).toFixed(1);
  const leverageRatio  = (totalAssets/curNW).toFixed(2);
  const solvencyRatio  = (curNW/totalAssets*100).toFixed(1);
  const spendToNW      = (annualSpend/curNW*100).toFixed(2);
  const liquidCoverage = Math.floor(investable/curSpend);

  function yrsToTarget(target, rate) {
    if (curNW >= target) return 0;
    return Math.ceil(Math.log(target/curNW)/Math.log(1+rate));
  }

  return (
    <WideGrid wide={wide}>

      {/* FI STATUS HERO */}
      <Card style={{ background:"linear-gradient(135deg,#0a1628 0%,#0f172a 100%)",
        border:"1px solid #1e3a5f", padding:"18px 16px", marginBottom:12 }}>

          const annualSpd = ANNUAL_SPEND;

          const selfFundingPost  = portNetPost >= annualSpd;

          function yearsToDepletion(nw, spend, rate) {
            if (rate >= spend / nw) return 999;
            var bal = nw;
            for (var y = 0; y < 200; y++) {
              bal = bal * (1 + rate) - spend;

                  <div style={{ fontSize:10, color:T.dim, marginTop:4 }}>{fmt(portNet,true)}/yr net</div>

function SpotOn({ derived, wide }) {
  const { curNW, curSpend, avgSpend } = derived;

  // Realistic scenarios based on current market analysis (Apr 2026)
  // Last round: $3.6B valuation (May 2022, peak market). Toast market cap ~$16B at 2.3x revenue.
  // SpotOn ~$750M revenue → realistic exit range $1-2B → proceeds ~$10-15M for your stake.
  // IPO window closed. M&A environment weak. Exit likely 2028-2030.
  const scenarios = [
    { label:"Distressed",  emoji:"🐻", amount:5000000,  color:"#f87171",
      desc:"Fire-sale M&A or recap — buyer controls terms", ubsLabel:"Not modeled by UBS" },
    { label:"Base Case",   emoji:"🎯", amount:10000000, color:"#f59e0b",
      desc:"~1.3x revenue exit, 2028-2030, strategic buyer", ubsLabel:"Realistic central case" },
    { label:"Upside",      emoji:"📈", amount:15000000, color:"#34d399",
      desc:"~2x revenue exit, market improves, willing buyer", ubsLabel:"Bull case given current conditions" },
  ];

  // Tax: FL no state, fed LTCG+NIIT = 23.8%

  function scenarioMetrics(amount) {
    const proFormaNW    = curNW + amount;
    const portGross     = proFormaNW * (P.portReturn / 100);
    const portNet       = portGross * (1 - FED_TAX);
    const ssIncome      = P.ssMax + P.ssHailey;
    const selfFundNet   = portNet >= ANNUAL_SPEND;
    const selfFundSS    = (portNet + ssIncome) >= ANNUAL_SPEND;
    const spendVsNet    = (ANNUAL_SPEND / portNet * 100).toFixed(0);
    // After-tax net rate for runway
    const netRate       = (P.portReturn / 100) * (1 - FED_TAX);
    // Runway: years until depletion at $120K/mo
    function runway(nw, rate) {
      if (rate >= ANNUAL_SPEND / nw) return 999;
      var b = nw;
      for (var y = 0; y < 200; y++) { b = b*(1+rate) - ANNUAL_SPEND; if (b<=0) return y+1; }
      return 999;
    }
    const runwayYrs = runway(proFormaNW, netRate);
    const yrs30m = proFormaNW >= 30e6 ? 0 : Math.ceil(Math.log(30e6/proFormaNW)/Math.log(1.074));
    const yrs50m = proFormaNW >= 50e6 ? 0 : Math.ceil(Math.log(50e6/proFormaNW)/Math.log(1.074));
    return { proFormaNW, portGross, portNet, selfFundNet, selfFundSS, spendVsNet, runwayYrs, yrs30m, yrs50m, ssIncome, netRate };
  }

  const [active, setActive] = useState(1); // default: Base Case

  const sc  = scenarios[active];
  const m   = scenarioMetrics(sc.amount);

  // UBS Monte Carlo for base/bull scenarios
  const ubsMC = [null, null, 85]; // only original $15M UBS scenario had MC data; now mapped to upside

  return (
    <WideGrid wide={wide}>

      {/* HEADER */}
      <Card style={{ background:"linear-gradient(135deg,#0c0a00 0%,#0f172a 100%)",
        border:"1px solid #78350f", padding:"18px 16px", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
          <span style={{ fontSize:28 }}>📊</span>
          <div>
            <div style={{ fontSize:16, fontWeight:700, color:"#fbbf24" }}>SpotOn Exit Analysis</div>
            <div style={{ fontSize:10, color:T.dim, fontFamily:"monospace" }}>
              Realistic exit window 2028–2030 · Original stake from Appetize acquisition (2021)
            </div>
          </div>
        </div>
        <div style={{ fontSize:11, color:T.muted, marginTop:8, lineHeight:1.6 }}>
          UBS originally modeled $15–30M in 2026. Market conditions have changed materially —
          fintech POS valuations compressed, IPO window closed, Toast trades at ~2.3x revenue.
          At SpotOn's ~$750M revenue, a realistic exit range is <span style={{ color:"#f59e0b", fontWeight:600 }}>$10–15M</span> for your stake,
          likely via strategic M&A in 2028–2030. The $30M scenario is excluded as it requires
          a return to 2022 market conditions. Plan around $10M base, $15M upside.
        </div>
      </Card>

      {/* SCENARIO SELECTOR */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>
        {scenarios.map(function(s, i) {
          const isActive = active === i;
          return (
            <div key={s.label} onClick={function(){ setActive(i); }}
              style={{ background:isActive ? s.color+"20" : T.surf,
                border:"2px solid "+(isActive ? s.color : T.border),
                borderRadius:12, padding:"12px 10px", cursor:"pointer",
                textAlign:"center", transition:"all 0.15s",
                WebkitTapHighlightColor:"transparent" }}>
              <div style={{ fontSize:22, marginBottom:4 }}>{s.emoji}</div>
              <div style={{ fontSize:11, fontWeight:700, color:isActive ? s.color : T.txt }}>{s.label}</div>
              <div style={{ fontSize:14, fontWeight:700, color:isActive ? s.color : T.muted,
                fontFamily:"monospace", marginTop:2 }}>{fmt(s.amount,true)}</div>
            </div>
          );
        })}
      </div>

      {/* ACTIVE SCENARIO DETAIL */}
      <Card style={{ border:"2px solid "+sc.color, background:sc.color+"08", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
          <span style={{ fontSize:28 }}>{sc.emoji}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:700, color:sc.color }}>{sc.label} — {fmt(sc.amount,true)}</div>

          </div>
          {ubsMC[active] && (

            <span style={{ color:"#34d399", fontWeight:600 }}>
              {fmt(Math.round((3600000*0.94-CONDO.mortgageBalance-Math.max(0,(3600000-CONDO.totalBasis-500000))*0.238)/50000)*50000,true)}</span>{" "}
            after commission, mortgage payoff, and taxes — capital that immediately starts
            compounding rather than draining.
          </div>
        </div>
      </Card>

    </WideGrid>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("overview");
  const [ready, setReady] = useState(false);
  const [wide, setWide] = useState(typeof window !== "undefined" && window.innerWidth >= 768);

  useEffect(function() {
    var t = setTimeout(function() { setReady(true); }, 60);
    function onResize() { setWide(window.innerWidth >= 768); }
    window.addEventListener("resize", onResize);
    return function() { clearTimeout(t); window.removeEventListener("resize", onResize); };
  }, []);

  const derived = useMemo(function() {
    const nwArr = Object.entries(NW2022);
    const curNW = nwArr[nwArr.length - 1][1];
    const prevNW = nwArr[nwArr.length - 2][1];
    const nwDelta = curNW - prevNW;
    const nwDeltaPct = (nwDelta / prevNW * 100).toFixed(1);
    const spendArr = Object.entries(SP2022);
    const curSpend = spendArr[spendArr.length - 1][1];
    const recent12 = spendArr.slice(-13, -1);
    const avgSpend = recent12.reduce(function(s, e) { return s + e[1]; }, 0) / recent12.length;
    const totalAssets = D.groups.filter(function(g) { return g.value > 0; }).reduce(function(s, g) { return s + g.value; }, 0);
    const totalLiab = Math.abs(D.groups.find(function(g) { return g.name === "Liabilities"; }).value);
    return { curNW, prevNW, nwDelta, nwDeltaPct, curSpend, avgSpend, totalAssets, totalLiab };
  }, []);

  const content = (
    <>
      {tab === "overview" && <Overview derived={derived} wide={wide} />}
      {tab === "spending"  && <Spending derived={derived} wide={wide} />}
      {tab === "networth"  && <NetWorth derived={derived} wide={wide} />}
      {tab === "vsworld"   && <VsWorld derived={derived} wide={wide} />}
      {tab === "insights"  && <Insights derived={derived} wide={wide} />}
      {tab === "spoton"    && <SpotOn derived={derived} wide={wide} />}
      {tab === "ubsperf"   && <UBSPerf wide={wide} />}
      {tab === "condo"     && <CondoAnalysis wide={wide} />}
    </>
  );

  // ── WIDE LAYOUT (iPad / desktop ≥ 768px) ──
  if (wide) {
    return (
      <div style={{ display:"flex", height:"100vh", background:T.bg, color:T.txt,
        fontFamily:"system-ui, sans-serif", overflow:"hidden" }}>

        {/* SIDEBAR NAV */}
        <div style={{ width:200, flexShrink:0, background:T.surf,
          borderRight:"1px solid "+T.border, display:"flex", flexDirection:"column",
          padding:"0 0 24px 0", overflowY:"auto" }}>

          {/* Sidebar header */}
          <div style={{ padding:"24px 20px 20px", borderBottom:"1px solid "+T.border }}>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:3, color:T.blue,
              fontFamily:"monospace", textTransform:"uppercase", marginBottom:4 }}>Portfolio</div>
            <div style={{ fontSize:22, fontWeight:700, letterSpacing:-0.5, color:T.txt }}>
              {fmt(derived.curNW)}
            </div>
            <div style={{ fontSize:11, fontFamily:"monospace", marginTop:3,
              color:derived.nwDelta >= 0 ? T.green : T.red }}>
              {derived.nwDelta >= 0 ? "▲" : "▼"} {fmt(Math.abs(derived.nwDelta), true)} this month
            </div>
            <div style={{ fontSize:10, color:T.dim, fontFamily:"monospace", marginTop:2 }}>
              As of {D.asOf}
            </div>
          </div>

          {/* Nav items */}
          <div style={{ flex:1, padding:"12px 10px" }}>
            {TABS.map(function(t) {
              const active = tab === t.id;
              return (
                <button key={t.id} onClick={function() { setTab(t.id); }}
                  style={{ width:"100%", display:"flex", alignItems:"center", gap:12,
                    padding:"11px 12px", marginBottom:2, border:"none", borderRadius:10,
                    background:active ? T.blue+"18" : "transparent",
                    cursor:"pointer", textAlign:"left",
                    borderLeft: active ? "3px solid "+T.blue : "3px solid transparent",
                    transition:"all 0.15s", WebkitTapHighlightColor:"transparent" }}>
                  <span style={{ fontSize:18, lineHeight:1 }}>{t.icon}</span>
                  <span style={{ fontSize:13, fontWeight:active ? 700 : 400,
                    color:active ? T.blue : T.muted, letterSpacing:0.2 }}>
                    {t.label}
                  </span>
                </button>
              );
            })}
          </div>
        </div>

        {/* MAIN CONTENT */}
        <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" }}>
          <div style={{ maxWidth:960, margin:"0 auto", padding:"24px 28px 48px",
            opacity:ready ? 1 : 0, transition:"opacity 0.35s" }}>
            {content}
          </div>
        </div>
      </div>
    );
  }

  // ── MOBILE LAYOUT (< 768px) ──
  return (
    <div style={{ height:"100vh", background:T.bg, color:T.txt,
      fontFamily:"system-ui, sans-serif", display:"flex", flexDirection:"column",
      maxWidth:720, margin:"0 auto", overflow:"hidden" }}>

      {/* HEADER */}
      <div style={{ padding:"16px 16px 12px", borderBottom:"1px solid " + T.border,
        background:"linear-gradient(180deg,#0f172a 0%," + T.bg + " 100%)",
        display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:3, color:T.blue,
            fontFamily:"monospace", textTransform:"uppercase" }}>Portfolio</div>
          <div style={{ fontSize:10, color:T.dim, fontFamily:"monospace", marginTop:1 }}>
            As of {D.asOf}
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:20, fontWeight:700, letterSpacing:-0.5 }}>{fmt(derived.curNW)}</div>
          <div style={{ fontSize:11, color:derived.nwDelta >= 0 ? T.green : T.red,
            fontFamily:"monospace", marginTop:1 }}>
            {derived.nwDelta >= 0 ? "▲" : "▼"} {fmt(Math.abs(derived.nwDelta), true)} this month
          </div>
        </div>
      </div>

      {/* SCROLLABLE CONTENT — flex:1 + overflow:auto gives it the remaining height */}
      <div style={{ flex:1, overflowY:"auto", overflowX:"hidden",
        padding:"14px 14px 110px",
        opacity:ready ? 1 : 0, transition:"opacity 0.35s",
        WebkitOverflowScrolling:"touch" }}>
        {content}
      </div>

      {/* BOTTOM NAV */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:720,
        background:"rgba(9,15,28,0.96)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)",
        borderTop:"1px solid " + T.border,
        paddingBottom:"env(safe-area-inset-bottom, 10px)", zIndex:100 }}>
        <div style={{ display:"flex" }}>
          {TABS.map(function(t) {
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={function() { setTab(t.id); }}
                style={{ flex:1, padding:"10px 2px 8px", border:"none", background:"none",
                  cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2,
                  color:active ? T.blue : T.dim, transition:"color 0.15s",
                  WebkitTapHighlightColor:"transparent", minWidth:0 }}>
                <span style={{ fontSize:active ? 20 : 17, lineHeight:1, transition:"font-size 0.15s" }}>
                  {t.icon}
                </span>
                <span style={{ fontSize:active ? 9 : 0, fontFamily:"monospace", fontWeight:700,
                  letterSpacing:0.5, textTransform:"uppercase", overflow:"hidden",
                  maxHeight:active ? 14 : 0, transition:"all 0.15s", color:T.blue }}>
                  {t.label}
                </span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
